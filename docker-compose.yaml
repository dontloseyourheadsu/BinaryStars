services:
    binarystars-api:
        build:
            context: .
            dockerfile: BinaryStars.Api/Dockerfile
        ports:
        - "5004:8080"
        volumes:
        - ./kafka/secrets:/app/kafka/secrets:ro
        environment:
        - ASPNETCORE_URLS=http://+:8080
        - ASPNETCORE_ENVIRONMENT=Development
        - Kafka__BootstrapServers=binarystars-kafka:9092
        - Kafka__ScramBootstrapServers=binarystars-kafka:9092
        - Kafka__Security__UseTls=false
        - Kafka__Security__UseSasl=false
        - ConnectionStrings__DefaultConnection=Host=binarystars-db;Database=binarystars;Username=admin;Password=abc123=0
        - Hangfire__ConnectionString=Host=binarystars-hangfire;Database=binarystars_hangfire;Username=admin;Password=abc123=0
        depends_on:
            binarystars-db:
                condition: service_healthy
            binarystars-hangfire:
                condition: service_healthy
            binarystars-kafka:
                condition: service_healthy
            binarystars-grafana:
                condition: service_started
        networks:
        - binarystars-network
    
    binarystars-grafana:
        image: grafana/grafana:latest
        ports:
        - "3100:3000"
        environment:
        - GF_SECURITY_ADMIN_USER=admin
        - GF_SECURITY_ADMIN_PASSWORD=admin
        depends_on:
            binarystars-db:
                condition: service_healthy
        networks:
        - binarystars-network
    
    binarystars-db:
        image: postgres:16
        restart: always
        environment:
        - POSTGRES_USER=admin
        - POSTGRES_PASSWORD=abc123=0
        - POSTGRES_DB=binarystars
        ports:
        - "5434:5432"
        volumes:
        - db-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d binarystars"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
        - binarystars-network

    binarystars-hangfire:
        image: postgres:16
        restart: always
        environment:
        - POSTGRES_USER=admin
        - POSTGRES_PASSWORD=abc123=0
        - POSTGRES_DB=binarystars_hangfire
        ports:
        - "5433:5432"
        volumes:
        - hangfire-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d binarystars_hangfire"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
        - binarystars-network

    binarystars-kafka:
        image: confluentinc/cp-kafka:7.6.1
        ports:
        - "9092:9092"
        environment:
        - KAFKA_PROCESS_ROLES=broker,controller
        - KAFKA_NODE_ID=1
        - KAFKA_KRAFT_CLUSTER_ID=q1Sh2bIQo2Z6tQ0yF0l9AA
        - CLUSTER_ID=q1Sh2bIQo2Z6tQ0yF0l9AA
        - KAFKA_CONTROLLER_QUORUM_VOTERS=1@binarystars-kafka:9093
        - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
        - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
        - KAFKA_ADVERTISED_LISTENERS=INTERNAL://binarystars-kafka:9092,EXTERNAL://localhost:19092
        - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
        - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
        - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
        - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
        healthcheck:
            test: ["CMD-SHELL", "nc -z localhost 9092"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            binarystars-network:
                aliases:
                - binarystars-kafka
                - binarystars.kafka

volumes:
    db-data:
    hangfire-data:
    kafka-data:

networks:
    binarystars-network: